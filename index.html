<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Brain Visual - Iniciar Sesión</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">
          <i class="bi bi-braces-asterisk"></i>
        </div>
        <h1>Second Brain Visual</h1>
        <p>Tu mapa de conocimiento conectado</p>
      </div>

      <div class="login-hint">
        <i class="bi bi-info-circle"></i>
        <span>Credenciales de prueba: <strong>test@universidad.edu</strong> / <strong>123456</strong></span>
      </div>

      <div id="loginError" class="login-error"></div>

      <form id="loginForm" onsubmit="return false;">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@universidad.edu" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <div class="form-check">
          <input type="checkbox" id="remember">
          <label for="remember">Recordarme</label>
        </div>

        <button type="submit" class="btn btn-primary" onclick="App.handleLogin(document.getElementById('email').value, document.getElementById('password').value)">
          <i class="bi bi-box-arrow-in-right"></i>
          Iniciar Sesión
        </button>
      </form>

      <div class="login-links">
        ¿No tienes cuenta? <a href="#">Regístrate</a>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

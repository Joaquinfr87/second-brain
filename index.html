<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Brain Visual - Iniciar Sesión</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="login-bg-graph" id="loginBgGraph"></div>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">
          <i class="bi bi-braces-asterisk"></i>
        </div>
        <h1>Second Brain Visual</h1>
        <p>Tu mapa de conocimiento conectado</p>
      </div>

      <div class="login-hint">
        <i class="bi bi-info-circle"></i>
        <span>Credenciales de prueba: <strong>test@universidad.edu</strong> / <strong>123456</strong></span>
      </div>

      <div id="loginError" class="login-error"></div>

      <form id="loginForm" onsubmit="return false;">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@universidad.edu" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <div class="form-check">
          <input type="checkbox" id="remember">
          <label for="remember">Recordarme</label>
        </div>

        <button type="submit" class="btn btn-primary" onclick="App.handleLogin(document.getElementById('email').value, document.getElementById('password').value)">
          <i class="bi bi-box-arrow-in-right"></i>
          Iniciar Sesión
        </button>
      </form>

      <div class="login-links">
        ¿No tienes cuenta? <a href="#">Regístrate</a>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof cytoscape === 'undefined') return;
      const miniNodes = [
        { data: { id: 'm1', label: 'POO' } },
        { data: { id: 'm2', label: 'SQL' } },
        { data: { id: 'm3', label: 'ML' } },
        { data: { id: 'm4', label: 'Redes' } },
        { data: { id: 'm5', label: 'Algoritmos' } },
        { data: { id: 'm6', label: 'Patrones' } },
        { data: { id: 'm7', label: 'Estructuras' } },
        { data: { id: 'm8', label: 'Python' } },
        { data: { id: 'm9', label: 'Neuronas' } },
        { data: { id: 'm10', label: 'Datos' } }
      ];
      const miniEdges = [
        { data: { source: 'm1', target: 'm6' } },
        { data: { source: 'm1', target: 'm7' } },
        { data: { source: 'm3', target: 'm8' } },
        { data: { source: 'm3', target: 'm9' } },
        { data: { source: 'm2', target: 'm10' } },
        { data: { source: 'm5', target: 'm7' } },
        { data: { source: 'm4', target: 'm9' } },
        { data: { source: 'm8', target: 'm10' } },
        { data: { source: 'm6', target: 'm5' } },
        { data: { source: 'm3', target: 'm4' } }
      ];
      const colors = ['#60a5fa', '#f472b6', '#4ade80', '#c084fc', '#fbbf24', '#a78bfa', '#60a5fa', '#4ade80', '#c084fc', '#f472b6'];
      const cy = cytoscape({
        container: document.getElementById('loginBgGraph'),
        elements: { nodes: miniNodes, edges: miniEdges },
        style: [
          { selector: 'node', style: { 'background-color': 'data(color)', 'label': '', 'width': 18, 'height': 18, 'opacity': 0.5 } },
          { selector: 'edge', style: { 'line-color': 'rgba(167,139,250,0.15)', 'width': 1 } }
        ],
        layout: { name: 'random', padding: 20 },
        userZoomingEnabled: false,
        userPanningEnabled: false,
        boxSelectionEnabled: false,
        autoungrabify: true
      });
      cy.nodes().forEach((n, i) => { n.style('background-color', colors[i % colors.length]); });
      let angle = 0;
      setInterval(() => {
        angle += 0.003;
        cy.nodes().forEach((n, i) => {
          const pos = n.position();
          const cx = cy.width() / 2;
          const cy2 = cy.height() / 2;
          const a = angle + (i * 2 * Math.PI / cy.nodes().length);
          const r = Math.min(cx, cy2) * 0.6;
          n.position({ x: cx + r * Math.cos(a), y: cy2 + r * Math.sin(a) });
        });
      }, 50);
    });
  </script>
</body>
</html>
